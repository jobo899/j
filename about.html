<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OnclickPasswort</title>
    <style>
      body {
        background-color: lightblue;
        padding: 30px;
        font-family: Arial, sans-serif;
      }
    </style>
    <script>
        function checkPasswort() {
            var passwortFeld = document.getElementById("passwortFeld");
            var passwortText = passwortFeld.value.trim();
            
            // WICHTIG: Passwort sollte server-seitig validiert werden!
            // Dies ist nur zu Demonstrationszwecken:
            if(passwortText === "programmieren") {
                return true;
            }
            else {
                alert("Zugriff verweigert! Passwort falsch!");
                passwortFeld.value = "";
                return false;
            }
        }
    </script>
</head>
<body>
    <p style="font-size: 30pt;">🔐</p>
    <p>Bitte gib das Passwort für diese Seite ein.</p>
    <p>Passwort: <input id="passwortFeld" type="password" autocomplete="off"/></p>
    <a href="geheim.html" onclick="return checkPasswort();">
      Klicke für Passworteingabe und Aufruf der Website
    </a>
    <br>
    <p>Finden Sie den Code raus! Wir haben die Rätsel auf den Seiten versteckt.</p>
    <br>
    <h3>Viel Glück!</h3>
</body>
</html>
