<!DOCT<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Universal</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0a0f1c, #000);
  color: #00eaff;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* HUD */
.circle {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 2px solid #00eaff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  box-shadow: 0 0 30px #00eaff;
}

#output {
  margin-top: 20px;
  padding: 15px;
  width: 90%;
  max-width: 400px;
  border: 1px solid #00eaff;
  border-radius: 10px;
}

button {
  margin-top: 20px;
  padding: 15px 25px;
  font-size: 1rem;
  border: none;
  border-radius: 10px;
  background: #00eaff;
  color: black;
}
</style>
</head>

<body>

<div class="circle">🤖</div>
<div id="output">Bereit...</div>
<button id="btn">🎤 Start</button>

<script>
const output = document.getElementById("output");
const btn = document.getElementById("btn");

let recognition;
let supportsSpeech = false;

// 🔍 Check ob SpeechRecognition verfügbar
if (window.SpeechRecognition || window.webkitSpeechRecognition) {
  supportsSpeech = true;
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = "de-DE";
}

// 🔊 Stimme
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "de-DE";
  speech.rate = 0.95;
  speechSynthesis.speak(speech);
}

// 🧠 Memory
function saveMemory(key, value) {
  localStorage.setItem(key, value);
}

function getMemory(key) {
  return localStorage.getItem(key);
}

// 🎤 Button (funktioniert überall)
btn.onclick = () => {
  if (!supportsSpeech) {
    alert("Sprachsteuerung wird hier nicht unterstützt 😢");
    return;
  }

  output.innerText = "🎧 Höre...";

  recognition.start();

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.toLowerCase();
    output.innerText = "Du: " + text;
    respond(text);
  };

  recognition.onerror = () => {
    output.innerText = "❌ Fehler";
  };
};

// 🧠 Antworten
function respond(input) {
  let answer = "Das habe ich nicht verstanden.";

  if (input.includes("hallo")) {
    answer = "Hallo!";
  }
  else if (input.includes("zeit")) {
    answer = "Es ist " + new Date().toLocaleTimeString();
  }
  else if (input.includes("mein name ist")) {
    const name = input.split("mein name ist")[1].trim();
    saveMemory("name", name);
    answer = "Ich merke mir deinen Namen " + name;
  }
  else if (input.includes("wie heiße ich")) {
    const name = getMemory("name");
    answer = name ? "Du heißt " + name : "Ich kenne deinen Namen noch nicht.";
  }

  setTimeout(() => {
    output.innerText += "\nJarvis: " + answer;
    speak(answer);
  }, 300);
}

// 🤖 Auto-Hinweis je nach Gerät
if (!supportsSpeech) {
  output.innerText = "⚠️ Sprachsteuerung nicht voll unterstützt. Nutze Button.";
}
</script>

</body>
</html>
