    <!-- Uhr -->
    <div id="uhr"></div>

    <script>
        function updateUhr() {
            const jetzt = new Date();

            const optionen = {
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            };

            const deutscheZeit = jetzt.toLocaleDateString("de-DE", optionen);

            document.getElementById("uhr").innerHTML =
                "🕒 Aktuelle Zeit: " + deutscheZeit;
        }

        // Sofort anzeigen
        updateUhr();

        // Jede Sekunde aktualisieren
        setInterval(updateUhr, 1000);
    </script>
